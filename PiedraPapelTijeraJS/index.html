<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h1 id="tituloJuego">Piedra Papel Tijera</h1>
    
    <div id="juego">
        <div id="contenedorBotones">
            <!-- <h1>JUGADOR</h1> -->
            <button id="Piedra" onclick="jugar('Piedra')">
                <img src="Fotos/Piedra.png">
            </button>
            <button id="Papel" onclick="jugar('Papel')">
                <img src="Fotos/Papel.png">
            </button>
            <button id="Tijera" onclick="jugar('Tijera')">
                <img src="Fotos/Tijera.png">
            </button>
        </div>

        <h1 id="textoMedio">VS</h1>
        <div id="contenedorEnemigo">
            <!-- <h1>IA</h1> -->
            <img src="Fotos/cerebro.png" id="Enemigo">



        </div>

        <div id="contenedorEjecucion">
            <button id="Ejecutar" onclick="ejecutarJuego('Ejecutar')">Ejecutar</button>
        </div>
        <div id="contenedorResultado">
            <textarea id="Ganador" readonly>Ganador :?</textarea>
        </div>
        <div id="contenedorMarcador">
            <textarea id="Marcador" readonly>Marcador</textarea>
        </div>
        
    </div> 
    <div id="contenedorVolver">
        <button id="volverAtras" onclick="history.back()">Volver</button>
    </div>


</body>

</html>
